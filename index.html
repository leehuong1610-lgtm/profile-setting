<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <nav class="nav-icons">
                <div class="icon active">
                    <img src="image/element-4.svg" alt="Dashboard">
                </div>
                <div class="icon">
                    <img src="image/graph.svg" alt="Projects">
                </div>
                <div class="icon">
                    <img src="image/medal-star.svg" alt="Messages">
                </div>
                <div class="icon">
                    <img src="image/messages.svg" alt="Settings">
                </div>
                <div class="icon">
                    <img src="image/setting-2.svg" alt="Settings">
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="welcome">
                    <h1>Welcome, Amanda</h1>
                    <span>Tue, 07 June 2022</span>
                </div>
                <div class="header-tools">
                    <div class="search-bar">
                        <input type="text" class="search-input" placeholder="Search">
                    </div>
                    <div class="notification">
                        <img src="image/notification-bing.svg" alt="Notifications">
                    </div>
                    <img src="image/avt-account.svg" alt="Avatar" class="mini-avatar">
                </div>
            </header>

            <div class="profile-card">
                <div class="banner"></div>
                
                <div class="profile-body">
                    <div class="profile-header">
                        <div class="user-info">
                            <img src="image/avt-profile.svg" alt="Alexa Rawles" class="main-avatar">
                            <div class="name-box">
                                <h2>Alexa Rawles</h2>
                                <p>alexarawles@gmail.com</p>
                            </div>
                        </div>
                        <button class="btn-edit">Edit</button>
                    </div>


                    <div class="profile-main">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" placeholder="Your First Name">
                            </div>
                            <div class="form-group">
                                <label>Nick name</label>
                                <input type="text" placeholder="Your Nick Name">
                            </div>
                            <div class="form-group">
                                <label>Gender</label>
                                <input type="text" placeholder="Your Gender" class="drop-down">
                            </div>
                            <div class="form-group"> 
                                <label>Country</label>
                                <input type="text" placeholder="Your Country" class="drop-down">
                            </div>
                            <div class="form-group">
                                <label>Language</label>
                                <input type="text" placeholder="Your Language" class="drop-down">
                            </div>
                            <div class="form-group">
                                <label>Time Zone</label>
                                <input type="text" placeholder="Your Time Zone" class="drop-down">
                            </div>
                        </div>

                        <div class="email-section">
                            <h3>My email Address</h3>
                            <div class="email-item">
                                <div class="email-icon">
                                    <img src="image/sms.svg" alt="Email Icon">
                                </div>
                                <div class="email-details">
                                    <strong>alexarawles@gmail.com</strong>
                                    <span>1 month ago</span>
                                </div>
                            </div>
                            <button class="btn-add-email">+ Add Email Address</button>
                        </div>
                    </div>




                </div>
            </div>
        </main>
    </div>

</body>
</html>
